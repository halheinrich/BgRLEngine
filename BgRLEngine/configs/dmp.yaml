# BgRLEngine training configuration

movegen:
  dll_path: D:/Users/Hal/Documents/Visual Studio 2026/Projects/backgammon/BgMoveGen/BgMoveGen/bin/Release/net10.0/win-x64/publish/BgMoveGen.dll
  variant:  standard

network:
  hidden_layers: [256, 256]       # 2 hidden layers, 256 units each
  activation: relu                # relu for hidden layers; output is always sigmoid
  dropout: 0.0                    # dropout rate (0 = disabled)

training:
  td_lambda: 0.7                  # TD(λ) parameter
  learning_rate: 0.0001           # Adam learning rate
  epsilon_start: 0.10             # ε-greedy start value
  epsilon_end: 0.01               # ε-greedy final value
  epsilon_decay_games: 200000     # games over which ε decays linearly
  equity_weights: [1, 1, 1, -1, -1, -1]  # DMP (1a1a)

evaluation:
  cadence_games: 1000             # evaluate every N training games
  eval_match_size: 100            # games per evaluation match

sprt:
  p0: 0.70                        # H₀ boundary (not ready)
  p1: 0.76                        # H₁ boundary (ready to promote)
  alpha: 0.05                     # false promotion rate
  beta: 0.10                      # missed promotion rate
  hard_cap: 2000                  # max games before forced reject
  gate_threshold: 0.70            # rolling win rate to trigger SPRT

plateau:
  base_budget: 500000             # base games budget for level 0→1
  budget_scale: 1.5               # multiply budget by this per level
  staleness_window: 200000        # game window for staleness check
  staleness_min_improvement: 0.02 # minimum win rate improvement in window
  max_failed_sprts: 3             # failed SPRTs before halving remaining budget

device: auto                      # auto, cpu, or cuda
seed: null                        # random seed (null = random)